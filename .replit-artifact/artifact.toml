kind = "web"
previewPath = "/"
title = "J.K Typing Master"
version = "1.0.0"
id = "artifacts/jk-typing-master"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24485

[services.development]
run = "pnpm --filter @workspace/jk-typing-master run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jk-typing-master", "run", "build" ]
publicDir = "artifacts/jk-typing-master/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24485"
BASE_PATH = "/"
